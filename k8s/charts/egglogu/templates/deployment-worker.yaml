apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "egglogu.fullname" . }}-worker
  labels:
    {{- include "egglogu.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      {{- include "egglogu.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "egglogu.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 60
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - celery
            - -A
            - src.worker
            - worker
            - --loglevel=info
            - --concurrency={{ .Values.worker.concurrency }}
            - -Q
            - {{ .Values.worker.queues }}
          envFrom:
            - configMapRef:
                name: {{ include "egglogu.configmapName" . }}
            - secretRef:
                name: {{ include "egglogu.secretName" . }}
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@{{ include "egglogu.postgres.primary" . }}:5432/$(POSTGRES_DB)"
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - src.worker
                - inspect
                - ping
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
