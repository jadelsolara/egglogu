apiVersion: v1
kind: Secret
metadata:
  name: {{ include "egglogu.secretName" . }}
  labels:
    {{- include "egglogu.labels" . | nindent 4 }}
type: Opaque
data:
  {{- /* All secrets are base64 encoded. Provide via --set at install time. */}}
  JWT_SECRET_KEY: {{ .Values.secrets.jwtSecretKey | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | b64enc | quote }}
  REPLICATOR_PASSWORD: {{ .Values.secrets.replicatorPassword | b64enc | quote }}
  DATABASE_URL: {{ .Values.secrets.databaseUrl | b64enc | quote }}
  REDIS_URL: {{ .Values.secrets.redisUrl | b64enc | quote }}
  {{- if .Values.secrets.stripeSecretKey }}
  STRIPE_SECRET_KEY: {{ .Values.secrets.stripeSecretKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.stripeWebhookSecret }}
  STRIPE_WEBHOOK_SECRET: {{ .Values.secrets.stripeWebhookSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.resendApiKey }}
  RESEND_API_KEY: {{ .Values.secrets.resendApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.r2EndpointUrl }}
  R2_ENDPOINT_URL: {{ .Values.secrets.r2EndpointUrl | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.r2AccessKey }}
  R2_ACCESS_KEY_ID: {{ .Values.secrets.r2AccessKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.r2SecretKey }}
  R2_SECRET_ACCESS_KEY: {{ .Values.secrets.r2SecretKey | b64enc | quote }}
  {{- end }}
