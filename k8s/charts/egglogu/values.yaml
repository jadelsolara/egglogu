# -- EGGlogU Helm Chart Values --

# -- Container image
image:
  repository: ghcr.io/jadelsolara/egglogu
  tag: latest
  pullPolicy: IfNotPresent

# -- Image pull secrets (for private registries)
imagePullSecrets: []

# -- Override chart name
nameOverride: ""
fullnameOverride: ""

# -- App (FastAPI / Gunicorn)
app:
  replicas: 2
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPU: 70
  gunicorn:
    workers: 4
    timeout: 60
    maxRequests: 1000
  livenessProbe:
    path: /health/live
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    path: /health/ready
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  port: 8000

# -- Worker (Celery)
worker:
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  concurrency: 4
  queues: "celery,email,reports,webhooks"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPU: 70

# -- Beat (Celery scheduler — singleton)
beat:
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

# -- PostgreSQL
postgres:
  image: postgres:16-alpine
  primary:
    storage: 20Gi
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 2Gi
    config:
      sharedBuffers: 512MB
      maxConnections: "200"
      workMem: 16MB
      effectiveCacheSize: 1536MB
      walLevel: replica
      maxWalSenders: "5"
      walKeepSize: 1GB
      maxReplicationSlots: "5"
  replica:
    enabled: true
    storage: 20Gi
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
  walArchive:
    storage: 10Gi
  auth:
    database: egglogu
    username: egglogu
    replicationUser: replicator

# -- PgBouncer (sidecar in app pod)
pgbouncer:
  enabled: true
  image: edoburu/pgbouncer:1.22.0
  maxClientConn: 500
  defaultPoolSize: 25
  minPoolSize: 5
  reservePoolSize: 5
  poolMode: transaction
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 250m
      memory: 64Mi

# -- Redis
redis:
  image: redis:7-alpine
  master:
    storage: 1Gi
    maxmemory: 128mb
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
  replicas: 2
  sentinel:
    enabled: true
    quorum: 2

# -- Ingress
ingress:
  enabled: true
  className: nginx
  host: api.egglogu.com
  tls:
    enabled: true
    clusterIssuer: letsencrypt-prod
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/affinity: cookie
    nginx.ingress.kubernetes.io/session-cookie-name: egglogu-affinity
    nginx.ingress.kubernetes.io/session-cookie-max-age: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

# -- Alembic migration job
migration:
  enabled: true
  backoffLimit: 3

# -- Backup CronJob
backup:
  enabled: true
  schedule: "0 3 * * *"
  storage: 50Gi
  retention:
    local: 7
    remote: 30
  r2:
    bucket: egglogu-backups

# -- Secrets — ALL values MUST be provided at install time via:
# --   helm install --set secrets.jwtSecretKey=$JWT_KEY ...
# --   or via external-secrets-operator / sealed-secrets
# -- NEVER commit real credentials to this file.
secrets:
  jwtSecretKey: ""
  postgresPassword: ""
  replicatorPassword: ""
  databaseUrl: ""
  redisUrl: ""
  stripeSecretKey: ""
  stripeWebhookSecret: ""
  resendApiKey: ""
  r2EndpointUrl: ""
  r2AccessKey: ""
  r2SecretKey: ""
