<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: rounded square -->
  <rect width="512" height="512" rx="90" fill="#0C2D48"/>

  <!-- Water drop shape (white, containment like the egg) -->
  <path d="M256 72 C230 72, 96 210, 96 310 C96 400, 168 448, 256 448 C344 448, 416 400, 416 310 C416 210, 282 72, 256 72Z" fill="#FFFFFF"/>

  <!-- Fish body -->
  <ellipse cx="260" cy="290" rx="115" ry="70" fill="#06B6D4"/>

  <!-- Tail -->
  <path d="M370 290 L420 240 L420 340 Z" fill="#0891B2"/>

  <!-- Dorsal fin -->
  <path d="M230 220 L270 180 L310 220" fill="#0891B2"/>

  <!-- Belly (lighter) -->
  <ellipse cx="250" cy="310" rx="85" ry="35" fill="#67E8F9"/>

  <!-- Pectoral fin -->
  <path d="M210 300 L175 330 L210 330" fill="#0891B2"/>

  <!-- Eye — same style as EGGlogU chicken -->
  <circle cx="195" cy="275" r="24" fill="#FFFFFF"/>
  <circle cx="200" cy="278" r="14" fill="#1F2937"/>
  <circle cx="205" cy="273" r="5" fill="#FFFFFF"/>

  <!-- Mouth -->
  <path d="M152 292 Q145 290, 148 285" stroke="#0E7490" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Scales (subtle) -->
  <circle cx="250" cy="275" r="14" fill="none" stroke="#0891B2" stroke-width="1.5" opacity="0.4"/>
  <circle cx="285" cy="280" r="14" fill="none" stroke="#0891B2" stroke-width="1.5" opacity="0.4"/>
  <circle cx="320" cy="285" r="14" fill="none" stroke="#0891B2" stroke-width="1.5" opacity="0.4"/>
  <circle cx="268" cy="300" r="12" fill="none" stroke="#0891B2" stroke-width="1.5" opacity="0.3"/>
  <circle cx="305" cy="300" r="12" fill="none" stroke="#0891B2" stroke-width="1.5" opacity="0.3"/>

  <!-- Bubbles -->
  <circle cx="148" cy="240" r="8" fill="none" stroke="#A5F3FC" stroke-width="2" opacity="0.6"/>
  <circle cx="132" cy="215" r="5" fill="none" stroke="#A5F3FC" stroke-width="2" opacity="0.5"/>
  <circle cx="155" cy="200" r="4" fill="none" stroke="#A5F3FC" stroke-width="1.5" opacity="0.4"/>

  <!-- Water ripples at bottom -->
  <path d="M130 400 Q170 388, 210 400 Q250 412, 290 400 Q330 388, 370 400" fill="none" stroke="#A5F3FC" stroke-width="2.5" opacity="0.3"/>
  <path d="M150 420 Q190 408, 230 420 Q270 432, 310 420 Q350 408, 380 420" fill="none" stroke="#A5F3FC" stroke-width="2" opacity="0.2"/>
</svg>
