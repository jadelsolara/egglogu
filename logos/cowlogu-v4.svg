<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: same dark blue as EGGlogU -->
  <rect width="512" height="512" rx="90" fill="#2C3E50"/>

  <!-- White egg containment — SAME as EGGlogU -->
  <ellipse cx="256" cy="270" rx="175" ry="195" fill="#FFFFFF"/>

  <!-- === COW — PROFILE facing left, like the chicken === -->
  <!-- Body (lower portion) -->
  <ellipse cx="290" cy="345" rx="80" ry="60" fill="#F5F5F5"/>
  <!-- Body patches (Holstein) -->
  <ellipse cx="315" cy="330" rx="40" ry="30" fill="#1F2937" transform="rotate(12,315,330)"/>
  <ellipse cx="265" cy="365" rx="28" ry="22" fill="#1F2937" transform="rotate(-8,265,365)"/>

  <!-- Head (profile, facing left) — big and characterful -->
  <circle cx="210" cy="280" r="72" fill="#F5F5F5"/>
  <!-- Head patches -->
  <ellipse cx="242" cy="255" rx="42" ry="32" fill="#1F2937" transform="rotate(-10,242,255)"/>
  <ellipse cx="185" cy="305" rx="20" ry="28" fill="#1F2937" transform="rotate(8,185,305)"/>

  <!-- Horn -->
  <path d="M248 212 C256 188, 270 183, 266 202" stroke="#F59E0B" stroke-width="9" fill="none" stroke-linecap="round"/>

  <!-- Ear -->
  <ellipse cx="272" cy="228" rx="22" ry="12" fill="#374151" transform="rotate(18,272,228)"/>
  <ellipse cx="270" cy="230" rx="13" ry="7" fill="#F9A8D4" transform="rotate(18,270,230)"/>

  <!-- Snout/muzzle (big, characterful) -->
  <ellipse cx="150" cy="310" rx="35" ry="28" fill="#FCDCB4"/>
  <!-- Nostrils -->
  <ellipse cx="135" cy="306" rx="7" ry="8" fill="#D4956B"/>
  <ellipse cx="152" cy="304" rx="5.5" ry="7" fill="#D4956B"/>

  <!-- Eye — SAME style as EGGlogU chicken -->
  <circle cx="195" cy="270" r="22" fill="#FFFFFF"/>
  <circle cx="189" cy="274" r="13" fill="#1F2937"/>
  <circle cx="184" cy="268" r="5" fill="#FFFFFF"/>

  <!-- Smile -->
  <path d="M138 332 Q150 342, 165 335" fill="none" stroke="#C4835A" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Bell -->
  <circle cx="190" cy="350" r="11" fill="#F59E0B"/>
  <circle cx="190" cy="354" r="4" fill="#D97706"/>

  <!-- Legs -->
  <rect x="240" y="398" width="13" height="28" rx="5" fill="#F5F5F5"/>
  <rect x="268" y="398" width="13" height="28" rx="5" fill="#F5F5F5"/>
  <rect x="302" y="398" width="13" height="28" rx="5" fill="#1F2937"/>
  <rect x="325" y="398" width="13" height="28" rx="5" fill="#F5F5F5"/>
  <!-- Hooves -->
  <rect x="238" y="422" width="17" height="7" rx="3" fill="#6B7280"/>
  <rect x="266" y="422" width="17" height="7" rx="3" fill="#6B7280"/>
  <rect x="300" y="422" width="17" height="7" rx="3" fill="#6B7280"/>
  <rect x="323" y="422" width="17" height="7" rx="3" fill="#6B7280"/>

  <!-- Tail (curving up from body) -->
  <path d="M365 320 C380 295, 375 275, 360 280" stroke="#1F2937" stroke-width="5" fill="none" stroke-linecap="round"/>
  <ellipse cx="358" cy="278" rx="8" ry="6" fill="#1F2937"/>
</svg>