<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: same dark blue as EGGlogU -->
  <rect width="512" height="512" rx="90" fill="#2C3E50"/>

  <!-- Seed/grain containment shape (white, like the egg) -->
  <path d="M256 68 C150 68, 80 170, 80 280 C80 395, 160 448, 256 448 C352 448, 432 395, 432 280 C432 170, 362 68, 256 68Z" fill="#FFFFFF"/>

  <!-- Golden wheat stalk — fills the shape like the chicken fills the egg -->
  <!-- Main stem -->
  <line x1="256" y1="420" x2="256" y2="120" stroke="#92700C" stroke-width="10" stroke-linecap="round"/>

  <!-- Grain pairs — fat, bold, flat style matching EGGlogU aesthetic -->
  <!-- Bottom -->
  <ellipse cx="216" cy="365" rx="38" ry="16" fill="#F59E0B" transform="rotate(-40,216,365)"/>
  <ellipse cx="296" cy="365" rx="38" ry="16" fill="#F59E0B" transform="rotate(40,296,365)"/>

  <!-- Mid-low -->
  <ellipse cx="212" cy="320" rx="36" ry="15" fill="#FBBF24" transform="rotate(-40,212,320)"/>
  <ellipse cx="300" cy="320" rx="36" ry="15" fill="#FBBF24" transform="rotate(40,300,320)"/>

  <!-- Mid -->
  <ellipse cx="218" cy="275" rx="33" ry="14" fill="#F59E0B" transform="rotate(-38,218,275)"/>
  <ellipse cx="294" cy="275" rx="33" ry="14" fill="#F59E0B" transform="rotate(38,294,275)"/>

  <!-- Mid-high -->
  <ellipse cx="225" cy="232" rx="28" ry="12" fill="#FBBF24" transform="rotate(-35,225,232)"/>
  <ellipse cx="287" cy="232" rx="28" ry="12" fill="#FBBF24" transform="rotate(35,287,232)"/>

  <!-- Top -->
  <ellipse cx="235" cy="194" rx="22" ry="10" fill="#F59E0B" transform="rotate(-30,235,194)"/>
  <ellipse cx="277" cy="194" rx="22" ry="10" fill="#F59E0B" transform="rotate(30,277,194)"/>

  <!-- Crown -->
  <ellipse cx="256" cy="155" rx="16" ry="26" fill="#FBBF24"/>

  <!-- Awns -->
  <line x1="256" y1="130" x2="256" y2="95" stroke="#D97706" stroke-width="4" stroke-linecap="round"/>
  <line x1="248" y1="135" x2="225" y2="100" stroke="#D97706" stroke-width="4" stroke-linecap="round"/>
  <line x1="264" y1="135" x2="287" y2="100" stroke="#D97706" stroke-width="4" stroke-linecap="round"/>

  <!-- Base leaves — bold green -->
  <path d="M256 420 C225 395, 175 398, 160 415" fill="#22C55E"/>
  <path d="M256 420 C287 395, 337 398, 352 415" fill="#16A34A"/>
</svg>
