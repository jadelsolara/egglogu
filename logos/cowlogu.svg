<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: rounded square -->
  <rect width="512" height="512" rx="90" fill="#1E3A5F"/>

  <!-- Milk drop shape (white, containment like the egg) -->
  <path d="M256 72 C220 72, 100 200, 100 310 C100 400, 170 448, 256 448 C342 448, 412 400, 412 310 C412 200, 292 72, 256 72Z" fill="#FFFFFF"/>

  <!-- Cow head -->
  <!-- Horns -->
  <path d="M170 195 C155 160, 130 155, 125 170" stroke="#F59E0B" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M342 195 C357 160, 382 155, 387 170" stroke="#F59E0B" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- Ears -->
  <ellipse cx="155" cy="215" rx="30" ry="20" fill="#1F2937" transform="rotate(-20,155,215)"/>
  <ellipse cx="155" cy="215" rx="20" ry="14" fill="#F9A8D4" transform="rotate(-20,155,215)"/>
  <ellipse cx="357" cy="215" rx="30" ry="20" fill="#1F2937" transform="rotate(20,357,215)"/>
  <ellipse cx="357" cy="215" rx="20" ry="14" fill="#F9A8D4" transform="rotate(20,357,215)"/>

  <!-- Face -->
  <ellipse cx="256" cy="280" rx="110" ry="105" fill="#F8F8F8"/>

  <!-- Black patches (classic Holstein pattern) -->
  <ellipse cx="200" cy="240" rx="40" ry="35" fill="#1F2937" transform="rotate(-10,200,240)"/>
  <ellipse cx="320" cy="255" rx="35" ry="30" fill="#1F2937" transform="rotate(15,320,255)"/>
  <ellipse cx="270" cy="210" rx="25" ry="20" fill="#1F2937"/>

  <!-- Snout/muzzle -->
  <ellipse cx="256" cy="335" rx="55" ry="40" fill="#F5D0B0"/>

  <!-- Nostrils -->
  <ellipse cx="238" cy="338" rx="10" ry="12" fill="#D4956B"/>
  <ellipse cx="274" cy="338" rx="10" ry="12" fill="#D4956B"/>

  <!-- Eyes — same style as EGGlogU -->
  <!-- Left eye -->
  <circle cx="210" cy="270" r="24" fill="#FFFFFF"/>
  <circle cx="215" cy="273" r="14" fill="#1F2937"/>
  <circle cx="220" cy="268" r="5" fill="#FFFFFF"/>

  <!-- Right eye -->
  <circle cx="302" cy="270" r="24" fill="#FFFFFF"/>
  <circle cx="307" cy="273" r="14" fill="#1F2937"/>
  <circle cx="312" cy="268" r="5" fill="#FFFFFF"/>

  <!-- Mouth -->
  <path d="M240 362 Q256 372, 272 362" fill="none" stroke="#C4835A" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Bell -->
  <circle cx="256" cy="395" r="14" fill="#F59E0B"/>
  <circle cx="256" cy="400" r="5" fill="#D97706"/>
</svg>
