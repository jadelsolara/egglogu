<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: same dark blue as EGGlogU -->
  <rect width="512" height="512" rx="90" fill="#2C3E50"/>

  <!-- White egg containment -->
  <path d="M256 62 C158 62, 78 155, 78 265 C78 385, 153 452, 256 452 C359 452, 434 385, 434 265 C434 155, 354 62, 256 62Z" fill="#FFFFFF"/>

  <!-- Green grass base -->
  <path d="M78 385 C110 360, 180 348, 256 355 C332 348, 402 360, 434 385 C434 420, 370 452, 256 452 C142 452, 78 420, 78 385Z" fill="#4ADE80"/>
  <path d="M78 395 C120 375, 170 368, 210 378 C240 385, 180 388, 140 400 C110 408, 90 412, 78 405Z" fill="#22C55E"/>

  <!-- Green bushes behind barn -->
  <circle cx="128" cy="310" r="28" fill="#22C55E"/>
  <circle cx="148" cy="300" r="24" fill="#16A34A"/>
  <circle cx="110" cy="318" r="22" fill="#15803D"/>
  <circle cx="385" cy="305" r="30" fill="#22C55E"/>
  <circle cx="405" cy="315" r="25" fill="#16A34A"/>
  <circle cx="370" cy="318" r="22" fill="#15803D"/>

  <!-- === SILO (behind barn, right side) === -->
  <path d="M345 178 L345 388 C345 395, 355 400, 370 400 C385 400, 395 395, 395 388 L395 178 Z" fill="#E8C888"/>
  <!-- Silo dome -->
  <path d="M342 182 C342 160, 355 148, 370 148 C385 148, 398 160, 398 182 Z" fill="#8B98B0"/>
  <!-- Silo bands -->
  <line x1="345" y1="220" x2="395" y2="220" stroke="#C4A060" stroke-width="2"/>
  <line x1="345" y1="270" x2="395" y2="270" stroke="#C4A060" stroke-width="2"/>
  <line x1="345" y1="320" x2="395" y2="320" stroke="#C4A060" stroke-width="2"/>
  <line x1="345" y1="370" x2="395" y2="370" stroke="#C4A060" stroke-width="2"/>
  <!-- Silo windows -->
  <path d="M362 240 C362 234, 370 230, 378 234 L378 252 C378 256, 370 258, 362 254 Z" fill="#2D3748" opacity="0.6"/>
  <path d="M362 300 C362 294, 370 290, 378 294 L378 312 C378 316, 370 318, 362 314 Z" fill="#2D3748" opacity="0.6"/>

  <!-- === RED BARN — gambrel roof style === -->
  <!-- Barn body -->
  <rect x="135" y="245" width="210" height="148" rx="3" fill="#DC2626"/>
  <!-- Barn body shadow/depth on right -->
  <rect x="320" y="245" width="25" height="148" fill="#B91C1C"/>

  <!-- Gambrel roof — double slope classic barn roof -->
  <!-- Lower steep part -->
  <path d="M120 250 L165 200 L240 168 L345 200 L360 250 Z" fill="#7B8BA2"/>
  <!-- Upper shallow part already included -->
  <!-- White trim on roof edges -->
  <path d="M120 250 L165 200 L240 168 L345 200 L360 250" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linejoin="round"/>
  <!-- Roof ridge line -->
  <line x1="165" y1="200" x2="345" y2="200" stroke="#6B7A90" stroke-width="3"/>

  <!-- Hay loft opening (top center, with hay poking out) -->
  <rect x="215" y="208" width="52" height="32" rx="3" fill="#1F2937"/>
  <!-- Hay sticking out -->
  <path d="M222 240 C218 228, 212 218, 208 212" stroke="#EAB308" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M232 240 C230 226, 226 216, 220 208" stroke="#FACC15" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M240 240 C240 228, 238 218, 234 210" stroke="#EAB308" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M248 240 C250 228, 252 220, 248 212" stroke="#FACC15" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M258 240 C262 230, 268 220, 272 214" stroke="#EAB308" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- Barn door (brown wood, center) -->
  <path d="M205 393 L205 295 C205 280, 220 270, 240 270 C260 270, 275 280, 275 295 L275 393 Z" fill="#92400E"/>
  <!-- Door X pattern (white) -->
  <line x1="208" y1="290" x2="272" y2="390" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  <line x1="272" y1="290" x2="208" y2="390" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>

  <!-- Side windows with X pattern -->
  <!-- Left window -->
  <rect x="150" y="285" width="40" height="35" rx="3" fill="#FFFFFF"/>
  <rect x="154" y="289" width="32" height="27" rx="2" fill="#87CEEB" opacity="0.5"/>
  <line x1="150" y1="285" x2="190" y2="320" stroke="#FFFFFF" stroke-width="3"/>
  <line x1="190" y1="285" x2="150" y2="320" stroke="#FFFFFF" stroke-width="3"/>
  <line x1="170" y1="285" x2="170" y2="320" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="150" y1="302" x2="190" y2="302" stroke="#FFFFFF" stroke-width="2.5"/>

  <!-- Right window -->
  <rect x="290" y="285" width="40" height="35" rx="3" fill="#FFFFFF"/>
  <rect x="294" y="289" width="32" height="27" rx="2" fill="#87CEEB" opacity="0.5"/>
  <line x1="290" y1="285" x2="330" y2="320" stroke="#FFFFFF" stroke-width="3"/>
  <line x1="330" y1="285" x2="290" y2="320" stroke="#FFFFFF" stroke-width="3"/>
  <line x1="310" y1="285" x2="310" y2="320" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="290" y1="302" x2="330" y2="302" stroke="#FFFFFF" stroke-width="2.5"/>

  <!-- === FENCE (left side) === -->
  <line x1="92" y1="368" x2="140" y2="358" stroke="#A07530" stroke-width="5" stroke-linecap="round"/>
  <line x1="92" y1="378" x2="140" y2="370" stroke="#A07530" stroke-width="4" stroke-linecap="round"/>
  <!-- Fence posts -->
  <rect x="90" y="352" width="8" height="40" rx="2" fill="#8B6914" transform="rotate(-3,94,372)"/>
  <rect x="112" y="348" width="8" height="40" rx="2" fill="#8B6914" transform="rotate(-2,116,368)"/>
  <rect x="134" y="344" width="8" height="40" rx="2" fill="#8B6914" transform="rotate(-1,138,364)"/>

  <!-- Dirt path with stones -->
  <path d="M220 393 C215 410, 200 430, 190 445" stroke="#D4A456" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.4"/>
  <ellipse cx="205" cy="415" rx="6" ry="4" fill="#9CA3AF" opacity="0.4"/>
  <ellipse cx="195" cy="430" rx="5" ry="3" fill="#9CA3AF" opacity="0.35"/>
  <ellipse cx="212" cy="425" rx="4" ry="3" fill="#9CA3AF" opacity="0.3"/>

  <!-- === DIGITAL TECH OVERLAY === -->
  <!-- Circuit connection lines (cyan) -->
  <path d="M100 168 L135 168 L155 198" stroke="#22D3EE" stroke-width="2" fill="none" opacity="0.45" stroke-linecap="round"/>
  <path d="M410 195 L385 195 L370 178" stroke="#22D3EE" stroke-width="2" fill="none" opacity="0.45" stroke-linecap="round"/>
  <path d="M98 420 L125 405 L140 395" stroke="#22D3EE" stroke-width="2" fill="none" opacity="0.35" stroke-linecap="round"/>
  <path d="M418 405 L395 400 L380 395" stroke="#22D3EE" stroke-width="2" fill="none" opacity="0.35" stroke-linecap="round"/>

  <!-- Data nodes -->
  <circle cx="100" cy="168" r="4" fill="#22D3EE" opacity="0.6"/>
  <circle cx="155" cy="198" r="3" fill="#22D3EE" opacity="0.5"/>
  <circle cx="410" cy="195" r="4" fill="#22D3EE" opacity="0.6"/>
  <circle cx="98" cy="420" r="3.5" fill="#22D3EE" opacity="0.5"/>
  <circle cx="418" cy="405" r="3.5" fill="#22D3EE" opacity="0.5"/>

  <!-- Subtle scan lines -->
  <line x1="90" y1="280" x2="425" y2="280" stroke="#22D3EE" stroke-width="1" opacity="0.15"/>
  <line x1="90" y1="340" x2="425" y2="340" stroke="#22D3EE" stroke-width="1" opacity="0.12"/>
</svg>