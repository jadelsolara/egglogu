<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: same dark blue as EGGlogU -->
  <rect width="512" height="512" rx="90" fill="#2C3E50"/>

  <!-- Milk drop containment (white, like the egg) -->
  <path d="M256 68 C220 68, 92 200, 92 310 C92 405, 165 448, 256 448 C347 448, 420 405, 420 310 C420 200, 292 68, 256 68Z" fill="#FFFFFF"/>

  <!-- Cow — PROFILE VIEW facing left, like the chicken -->
  <!-- Body fills lower portion -->
  <ellipse cx="280" cy="340" rx="120" ry="80" fill="#F5F5F5"/>

  <!-- Black patches on body -->
  <ellipse cx="310" cy="325" rx="45" ry="35" fill="#1F2937" transform="rotate(10,310,325)"/>
  <ellipse cx="240" cy="355" rx="30" ry="25" fill="#1F2937" transform="rotate(-15,240,355)"/>

  <!-- Head (profile, facing left) -->
  <circle cx="185" cy="265" r="85" fill="#F5F5F5"/>

  <!-- Black patch on head -->
  <ellipse cx="215" cy="235" rx="50" ry="40" fill="#1F2937" transform="rotate(-15,215,235)"/>

  <!-- Horn (one visible in profile) -->
  <path d="M225 185 C235 150, 255 145, 250 165" stroke="#F59E0B" stroke-width="12" fill="none" stroke-linecap="round"/>

  <!-- Ear (one visible) -->
  <ellipse cx="260" cy="210" rx="30" ry="16" fill="#1F2937" transform="rotate(25,260,210)"/>
  <ellipse cx="258" cy="212" rx="18" ry="10" fill="#F9A8D4" transform="rotate(25,258,212)"/>

  <!-- Snout/muzzle (profile) -->
  <ellipse cx="115" cy="300" rx="45" ry="35" fill="#F5D0B0"/>

  <!-- Nostril -->
  <ellipse cx="95" cy="298" rx="9" ry="11" fill="#D4956B"/>

  <!-- Eye — SAME style as EGGlogU chicken -->
  <circle cx="170" cy="258" r="26" fill="#FFFFFF"/>
  <circle cx="163" cy="262" r="15" fill="#1F2937"/>
  <circle cx="158" cy="256" r="6" fill="#FFFFFF"/>

  <!-- Mouth -->
  <path d="M100 322 Q115 332, 130 325" fill="none" stroke="#C4835A" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Bell hanging below -->
  <circle cx="160" cy="345" r="12" fill="#F59E0B"/>
  <circle cx="160" cy="350" r="4" fill="#D97706"/>
</svg>
