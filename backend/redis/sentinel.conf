# EGGlogU Redis Sentinel Configuration
# Monitors redis master and performs automatic failover

port 26379

sentinel monitor egglogu-master redis 6379 2
sentinel down-after-milliseconds egglogu-master 5000
sentinel failover-timeout egglogu-master 30000
sentinel parallel-syncs egglogu-master 1

# NOTE: Set REDIS_PASSWORD via sentinel CLI at runtime, or use a
# templated config. Shell variables are NOT interpolated in Redis conf files.
# sentinel auth-pass egglogu-master YOUR_PASSWORD_HERE
