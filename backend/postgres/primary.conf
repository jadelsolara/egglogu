# EGGlogU PostgreSQL Primary — Streaming Replication Config
# Appended to postgresql.conf via Docker entrypoint

# ─── Replication ─────────────────────────────────────────────────────
wal_level = replica
max_wal_senders = 5
wal_keep_size = '1GB'
max_replication_slots = 5
hot_standby = on

# ─── WAL Archiving (for PITR) ───────────────────────────────────────
archive_mode = on
archive_command = 'test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'

# ─── Performance (tuned for replication) ─────────────────────────────
synchronous_commit = on
wal_buffers = 64MB
checkpoint_completion_target = 0.9
max_connections = 200
shared_buffers = 512MB
work_mem = 16MB
effective_cache_size = 1536MB

# ─── Logging ─────────────────────────────────────────────────────────
log_min_duration_statement = 500
log_connections = on
log_lock_waits = on
log_replication_commands = on
