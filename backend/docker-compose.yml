services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: egglogu
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-egglogu}
      POSTGRES_DB: egglogu
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - wal_archive:/var/lib/postgresql/wal_archive
      - ./postgres/init-primary.sql:/docker-entrypoint-initdb.d/01-replication.sql:ro
      - ./postgres/pg_hba_replication.conf:/docker-entrypoint-initdb.d/pg_hba_replication.conf:ro
    command: >
      postgres
      -c config_file=/var/lib/postgresql/data/postgresql.conf
      -c shared_buffers=512MB
      -c max_connections=200
      -c work_mem=16MB
      -c effective_cache_size=1536MB
      -c log_min_duration_statement=500
      -c log_connections=on
      -c log_lock_waits=on
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
      -c wal_level=replica
      -c max_wal_senders=5
      -c wal_keep_size=1GB
      -c max_replication_slots=5
      -c archive_mode=on
      -c archive_command='test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'
      -c log_replication_commands=on
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U egglogu"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    restart: unless-stopped

  postgres-replica:
    image: postgres:16-alpine
    environment:
      PGUSER: replicator
      PGPASSWORD: ${REPLICATOR_PASSWORD:-repl_secret_change_me}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata_replica:/var/lib/postgresql/data
      - ./postgres/init-replica.sh:/docker-entrypoint-initdb.d/init-replica.sh:ro
    command: >
      postgres
      -c hot_standby=on
      -c hot_standby_feedback=on
      -c max_standby_streaming_delay=30s
      -c max_connections=200
      -c shared_buffers=256MB
      -c work_mem=16MB
      -c effective_cache_size=768MB
      -c log_min_duration_statement=500
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U egglogu"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer:1.22.0
    environment:
      DATABASE_URL: postgres://egglogu:${POSTGRES_PASSWORD:-egglogu}@postgres:5432/egglogu
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 500
      DEFAULT_POOL_SIZE: 25
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
      SERVER_IDLE_TIMEOUT: 600
      SERVER_LIFETIME: 3600
    ports:
      - "127.0.0.1:6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly yes --appendfsync everysec
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redisdata:/data
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  redis-replica:
    image: redis:7-alpine
    command: redis-server --replicaof redis 6379 --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly yes
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redisdata_replica1:/data
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  redis-replica-2:
    image: redis:7-alpine
    command: redis-server --replicaof redis 6379 --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly yes
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redisdata_replica2:/data
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  redis-sentinel-1:
    image: redis:7-alpine
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./redis/sentinel.conf:/etc/redis/sentinel.conf:ro
    depends_on:
      redis:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    ports:
      - "127.0.0.1:26379:26379"
    deploy:
      resources:
        limits:
          memory: 64M
    restart: unless-stopped

  redis-sentinel-2:
    image: redis:7-alpine
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./redis/sentinel.conf:/etc/redis/sentinel.conf:ro
    depends_on:
      redis:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M
    restart: unless-stopped

  redis-sentinel-3:
    image: redis:7-alpine
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./redis/sentinel.conf:/etc/redis/sentinel.conf:ro
    depends_on:
      redis:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M
    restart: unless-stopped

  app:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
    restart: unless-stopped

  worker:
    build: .
    command: celery -A src.worker worker --loglevel=info --concurrency=4 -Q celery,email,reports,webhooks,analytics
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    restart: unless-stopped

  beat:
    build: .
    command: celery -A src.worker beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    restart: unless-stopped

  backup:
    image: amazon/aws-cli:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: egglogu
      PGPASSWORD: ${POSTGRES_PASSWORD:-egglogu}
      PGDATABASE: egglogu
      # Cloudflare R2 off-site backup (optional — falls back to local-only)
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-egglogu-backups}
      R2_RETENTION_DAYS: ${R2_RETENTION_DAYS:-30}
    volumes:
      - backups:/backups
      - ./scripts/backup_r2.sh:/backup_r2.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "EGGlogU backup service started — daily pg_dump + R2 off-site"
        # Install PostgreSQL client for pg_dump
        apk add --no-cache postgresql16-client 2>/dev/null || yum install -y postgresql16 2>/dev/null || true
        while true; do
          /bin/sh /backup_r2.sh
          echo "Next backup in 24h..."
          sleep 86400
        done
    restart: unless-stopped

volumes:
  pgdata:
  pgdata_replica:
  wal_archive:
  redisdata:
  redisdata_replica1:
  redisdata_replica2:
  backups:
