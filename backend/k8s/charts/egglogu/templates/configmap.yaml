apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "egglogu.fullname" . }}-config
  labels:
    {{- include "egglogu.labels" . | nindent 4 }}
data:
  FRONTEND_URL: {{ .Values.app.frontendUrl | quote }}
  LOG_LEVEL: {{ .Values.app.logLevel | quote }}
  WEB_CONCURRENCY: {{ .Values.app.webConcurrency | quote }}
  CELERY_QUEUES: {{ .Values.app.celeryQueues | quote }}
