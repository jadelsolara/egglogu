# EGGlogU Production Server Block
# Rate limit zones and upstream defined in nginx.conf

server {
    listen 80;
    listen [::]:80;
    server_name api.egglogu.com _;

    client_max_body_size 10M;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # Common proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Health check — no rate limit, no logging
    location /health {
        access_log off;
        proxy_pass http://fastapi;
    }

    # Auth endpoints — strict rate limit (5 req/s burst 10)
    location /api/v1/auth/ {
        limit_req zone=auth burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://fastapi;
    }

    # Leads endpoint — moderate rate limit
    location /api/leads/ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://fastapi;
    }

    # API endpoints — standard rate limit (30 req/s burst 50)
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        limit_req_status 429;
        proxy_pass http://fastapi;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://fastapi;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # Block docs in production
    location /docs { return 404; }
    location /redoc { return 404; }
    location /openapi.json { return 404; }

    # Catch-all
    location / {
        proxy_pass http://fastapi;
    }
}
