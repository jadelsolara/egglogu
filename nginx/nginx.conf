# ============================================================
# EGGlogU — Nginx Production Configuration
# ============================================================

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  2048;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log  /var/log/nginx/access.log  main;

    # ── Performance ────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ── Gzip Compression ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/plain
        text/xml;

    # ── Security: Hide Nginx version ──────────────────────────
    server_tokens off;

    # ── Real Client IP behind Cloudflare ─────────────────────
    map $http_cf_connecting_ip $real_client_ip {
        default $http_cf_connecting_ip;
        ""      $binary_remote_addr;
    }

    # ── Rate Limiting Zones ───────────────────────────────────
    # General API rate limit: 30 req/s per IP with burst
    limit_req_zone $real_client_ip zone=api:10m rate=30r/s;
    # Strict rate limit for auth endpoints: 5 req/s per IP
    limit_req_zone $real_client_ip zone=auth:10m rate=5r/s;

    # ── Upstream: FastAPI backend ─────────────────────────────
    upstream fastapi {
        server app:8000;
        keepalive 32;
    }

    # ── Include server blocks ─────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
